llm:
  model: "databricks-claude-opus-4-7"
  temperature: 0.0
  max_tokens: 4000
  timeout_seconds: 120
  concurrency_limit: 5

rule_parser:
  model: "databricks-claude-opus-4-7"
  temperature: 0.0
  max_tokens: 6000

judge:
  model: "databricks-claude-opus-4-7"
  temperature: 0.0
  max_tokens: 2000
  pass_threshold: 0.80

guidance:
  model: "databricks-claude-opus-4-7"
  temperature: 0.1
  max_tokens: 3000

risk:
  auto_approve_threshold: 0.40
  hitl_threshold: 0.75
  severity_normalizer: 3.0

checkpointer:
  type: "memory"

retry:
  max_attempts: 2
  backoff_seconds: 2
